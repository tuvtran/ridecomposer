<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ridecomposer</title>
<style>
  :root { --bg:#0a0a0e; --panel:#13131a; --panel2:#181820; --line:#23232e; --ink:#f4f4f6; --mut:#7a7a86; --hot:#fca50a; --cool:#5ad1e0; }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:"Helvetica Neue", Arial, system-ui, sans-serif; }
  body { overflow:hidden; }
  .hidden { display:none !important; }
  #app { display:flex; flex-direction:column; height:100vh; }

  /* ---- gallery ---- */
  #gallery { overflow-y:auto; padding:0 26px 40px; }
  .gtitle { padding:30px 0 4px; }
  .gtitle h1 { margin:0; font-size:30px; font-weight:700; letter-spacing:7px; }
  .gtitle .tag { color:var(--mut); font-size:13px; letter-spacing:5px; margin-top:6px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:18px; margin-top:26px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden;
    cursor:pointer; transition:.16s; }
  .card:hover { border-color:var(--hot); transform:translateY(-2px); }
  .card canvas { width:100%; height:150px; display:block; background:#070709; }
  .card .meta { padding:13px 15px 15px; }
  .card .nm { font-size:18px; font-weight:700; letter-spacing:1px; }
  .card .dt { color:var(--mut); font-size:11px; letter-spacing:2px; margin-top:3px; text-transform:uppercase; }
  .card .st { display:flex; gap:16px; margin-top:11px; }
  .card .st b { font-size:17px; font-weight:700; }
  .card .st span { color:var(--mut); font-size:10px; letter-spacing:1.5px; display:block; }

  /* ---- player ---- */
  #player { display:flex; flex-direction:column; height:100%; }
  header { display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; padding:16px 26px 8px; }
  .back { background:var(--panel); color:var(--mut); border:1px solid var(--line); border-radius:8px;
    padding:9px 14px; font:inherit; font-size:12px; letter-spacing:2px; cursor:pointer; }
  .back:hover { color:var(--hot); border-color:var(--hot); }
  h2 { margin:0; font-size:32px; font-weight:700; letter-spacing:5px; }
  .sub { color:var(--mut); font-size:13px; letter-spacing:6px; margin-top:4px; }
  #stage { flex:1; position:relative; min-height:0; }
  canvas#cv { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #transport { display:flex; align-items:center; gap:16px; padding:8px 26px; }
  #play { width:54px; height:54px; flex:0 0 auto; border-radius:50%; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:20px; cursor:pointer; transition:.15s; }
  #play:hover { border-color:var(--hot); color:var(--hot); }
  #scrub { flex:1; }
  .clock { font-variant-numeric:tabular-nums; color:var(--mut); font-size:13px; letter-spacing:1px; min-width:96px; text-align:right; }
  input[type=range] { -webkit-appearance:none; appearance:none; height:4px; border-radius:2px; background:var(--line); outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--ink); cursor:pointer; }
  input[type=range]::-moz-range-thumb { width:14px; height:14px; border:0; border-radius:50%; background:var(--ink); cursor:pointer; }
  #mix { display:flex; flex-wrap:wrap; gap:22px; padding:6px 26px 18px; align-items:center; }
  .knob { display:flex; flex-direction:column; gap:5px; min-width:128px; }
  .knob label { font-size:11px; letter-spacing:2px; color:var(--mut); text-transform:uppercase; }
  .seg { display:flex; gap:0; }
  .seg button { background:var(--panel); color:var(--mut); border:1px solid var(--line); border-right:0;
    padding:9px 13px; font:inherit; font-size:11px; letter-spacing:1px; cursor:pointer; text-transform:uppercase; }
  .seg button:first-child { border-radius:8px 0 0 8px; }
  .seg button:last-child { border-right:1px solid var(--line); border-radius:0 8px 8px 0; }
  .seg button.on { color:var(--hot); border-color:var(--hot); background:var(--panel2); }
  .seg .t { display:block; font-size:9px; letter-spacing:1px; opacity:.7; margin-top:2px; }
  .mantra { color:#3a3a44; font-style:italic; letter-spacing:1px; font-size:13px; margin-left:auto; }
</style>
</head>
<body>
<div id="app">
  <!-- gallery landing -->
  <div id="gallery">
    <div class="gtitle">
      <h1>RIDECOMPOSER</h1>
      <div class="tag" id="gtag"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- instrument -->
  <div id="player" class="hidden">
    <header>
      <div>
        <h2 id="title">RIDE</h2>
        <div class="sub" id="subtitle"></div>
      </div>
      <button class="back" id="back">← GALLERY</button>
    </header>
    <div id="stage"><canvas id="cv"></canvas></div>
    <div id="transport">
      <button id="play" aria-label="play / pause">&#9654;</button>
      <input id="scrub" type="range" min="0" max="1000" value="0" aria-label="timeline">
      <div class="clock" id="clock">0:00 / 0:00</div>
    </div>
    <div id="mix">
      <div class="knob"><label>genre / speed</label>
        <div class="seg" id="genre"></div></div>
      <div class="knob"><label>reverb <span id="wetv"></span></label>
        <input id="wet" type="range" min="0" max="100" value="30"></div>
      <div class="knob"><label>suffering <span id="shimv"></span></label>
        <input id="shim" type="range" min="0" max="200" value="100"></div>
      <div class="knob"><label>volume <span id="volv"></span></label>
        <input id="vol" type="range" min="0" max="100" value="85"></div>
      <div class="mantra" id="mantra"></div>
    </div>
  </div>
</div>

<script>
const DATA = __RIDECOMPOSER_DATA__;
const CFG = DATA.config;

// ---- genres: the speed slider. shorter = faster = more energetic ----------
const GENRES = {
  techno:    {label:"techno",    time:"1:00", dur:60,  bpm:140, swing:0,    kick:1.0,  hat:0.9,  openhat:true,  bass:0.85, pad:0.45, shimmer:1.25, bell:0.45, heart:0.35, drone:0.10},
  house:     {label:"house",     time:"2:00", dur:120, bpm:124, swing:0.16, kick:0.92, hat:0.75, openhat:true,  bass:0.80, pad:0.85, shimmer:0.85, bell:0.80, heart:0.55, drone:0.14},
  downtempo: {label:"downtempo", time:"4:00", dur:240, bpm:84,  swing:0,    kick:0.0,  hat:0.0,  openhat:false, bass:0.35, pad:1.0,  shimmer:1.0,  bell:1.0,  heart:1.0,  drone:0.16},
};
const GENRE_ORDER = ["techno","house","downtempo"];

// ---- small math -----------------------------------------------------------
const lerp=(a,b,t)=>a+(b-a)*t, clamp=(x,lo=0,hi=1)=>x<lo?lo:x>hi?hi:x, isNum=(x)=>typeof x==="number"&&isFinite(x);
function percentile(s,p){ if(!s.length)return 0; const i=p*(s.length-1),lo=Math.floor(i),hi=Math.min(lo+1,s.length-1); return lerp(s[lo],s[hi],i-lo); }
function normalizer(v){ const c=(v||[]).filter(isNum).slice().sort((a,b)=>a-b); let lo=percentile(c,0.05),hi=percentile(c,0.95); if(hi-lo<1e-9)hi=lo+1; const sp=hi-lo; return (x)=>clamp((x-lo)/sp); }
function sampler(times,vals){ if(!vals)return ()=>0; const T=[],V=[]; for(let i=0;i<vals.length;i++){ if(isNum(vals[i])&&isNum(times[i])){T.push(times[i]);V.push(vals[i]);} } if(!T.length)return ()=>0; const last=T.length-1;
  return (t)=>{ if(t<=T[0])return V[0]; if(t>=T[last])return V[last]; let lo=0,hi=last; while(hi-lo>1){const m=(lo+hi)>>1; if(T[m]<=t)lo=m; else hi=m;} const sp=T[hi]-T[lo]; return sp<1e-9?V[lo]:lerp(V[lo],V[hi],(t-T[lo])/sp); }; }
function xorshift01(seed){ let x=Math.imul(seed,2654435761)>>>0; x^=x>>>13; x=Math.imul(x,1274126177)>>>0; x^=x<<5; x>>>=0; return (x&0xFFFFFF)/0xFFFFFF; }
const hzFromSemi=(s)=>CFG.rootHz*Math.pow(2,s/12);
const RAMP=[[0,[8,4,18]],[.25,[66,10,104]],[.5,[147,38,103]],[.75,[221,81,58]],[.9,[252,165,10]],[1,[252,255,164]]];
function heat(x){ x=clamp(x); for(let j=0;j<RAMP.length-1;j++){ const[a,ca]=RAMP[j],[b,cb]=RAMP[j+1]; if(x<=b){ const f=b>a?(x-a)/(b-a):0; return `rgb(${ca.map((c,k)=>Math.round(lerp(c,cb[k],f))).join(",")})`; } } return "rgb(252,255,164)"; }
const fmt=(s)=>{ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); };

// ---- ride model -----------------------------------------------------------
function buildModel(ride){
  const s=ride.streams, T=s.time||[0,1], t0=T[0], t1=T[T.length-1];
  const m={ ride,t0,t1, pow:sampler(T,s.watts),nPow:normalizer(s.watts), hr:sampler(T,s.hr),nHr:normalizer(s.hr),
    cad:sampler(T,s.cadence),nCad:normalizer(s.cadence), alt:sampler(T,s.altitude),nAlt:normalizer(s.altitude),
    grade:sampler(T,s.grade), dist:sampler(T,s.distance), dmax:Math.max(1,...(s.distance||[1]).filter(isNum)) };
  const pts=ride.route||[]; m.route=pts;
  if(pts.length){ const mlat=pts.reduce((a,p)=>a+p[0],0)/pts.length, kx=Math.cos(mlat*Math.PI/180);
    const xs=pts.map(p=>p[1]*kx), ys=pts.map(p=>p[0]);
    m.kx=kx; m.x0=Math.min(...xs); m.x1=Math.max(...xs); m.y0=Math.min(...ys); m.y1=Math.max(...ys);
    m.cx=xs.reduce((a,b)=>a+b,0)/xs.length; m.cy=ys.reduce((a,b)=>a+b,0)/ys.length;  // mass centroid
    const cum=[0]; for(let k=1;k<pts.length;k++){ const dx=pts[k][1]-pts[k-1][1],dy=pts[k][0]-pts[k-1][0]; cum.push(cum[k-1]+Math.hypot(dx,dy)); }
    m.cum=cum; m.total=cum[cum.length-1]||1; m.effort=pts.map((_,k)=>m.nPow(m.pow(lerp(t0,t1,cum[k]/m.total)))); }
  return m;
}
const rideTime=(m,music,dur)=>lerp(m.t0,m.t1,clamp(music/dur));
function routeFit(m,bx,by,bw,bh){ const rw=(m.x1-m.x0)||1e-6, rh=(m.y1-m.y0)||1e-6, sc=Math.min(bw/rw,bh/rh);
  const ox=bx+(bw-rw*sc)/2, oy=by+(bh-rh*sc)/2; return (la,lo)=>[ox+(lo*m.kx-m.x0)*sc, oy+(m.y1-la)*sc]; }
// fit, but center the route's MASS (centroid) in the box, clamped so it stays inside —
// keeps a route with a thin tail from hugging a corner and leaving a dead void.
function routeFitMass(m,bx,by,bw,bh){ const rw=(m.x1-m.x0)||1e-6, rh=(m.y1-m.y0)||1e-6, sc=Math.min(bw/rw,bh/rh);
  const wpx=rw*sc, hpx=rh*sc;
  let ox=bx+bw/2-(m.cx-m.x0)*sc, oy=by+bh/2-(m.y1-m.cy)*sc;
  ox=Math.max(bx,Math.min(bx+bw-wpx,ox)); oy=Math.max(by,Math.min(by+bh-hpx,oy));
  return (la,lo)=>[ox+(lo*m.kx-m.x0)*sc, oy+(m.y1-la)*sc]; }

// ---- audio engine: realtime, mirrors audio.py + genre drums ---------------
const Engine={
  ctx:null, bus:null, master:null, wet:null, droneFilter:null, droneGain:null, padGain:null, shimGain:null,
  drone:[], pad:[], shim:[], noise:null, shimScale:1, genre:GENRES.house,
  init(){
    if(this.ctx) return;
    const ctx=new (window.AudioContext||window.webkitAudioContext)(); this.ctx=ctx;
    const master=ctx.createGain(); master.gain.value=CFG.master;
    const shaper=ctx.createWaveShaper(); shaper.curve=tanh(1.2); shaper.oversample="2x";
    master.connect(shaper).connect(ctx.destination);
    const bus=ctx.createGain(); bus.connect(master);                        // reverb-fed voices
    // stereo cross-feedback ping-pong delay (the "space")
    const dl=ctx.createDelay(1), dr=ctx.createDelay(1); dl.delayTime.value=CFG.delayTapL; dr.delayTime.value=CFG.delayTapR;
    const lpL=ctx.createBiquadFilter(), lpR=ctx.createBiquadFilter(); lpL.type=lpR.type="lowpass"; lpL.frequency.value=lpR.frequency.value=2200;
    const fbL=ctx.createGain(), fbR=ctx.createGain(); fbL.gain.value=fbR.gain.value=CFG.delayFeedback;
    const send=ctx.createGain(); bus.connect(send); send.connect(dl); send.connect(dr);
    dl.connect(lpL); lpL.connect(fbL); fbL.connect(dr); dr.connect(lpR); lpR.connect(fbR); fbR.connect(dl);
    const wet=ctx.createGain(); wet.gain.value=CFG.reverbWet;
    const pL=ctx.createStereoPanner(), pR=ctx.createStereoPanner(); pL.pan.value=-0.8; pR.pan.value=0.8;
    dl.connect(pL).connect(wet); dr.connect(pR).connect(wet); wet.connect(master);
    // sustained voices (config-only, identical across rides/genres)
    const warm=ctx.createPeriodicWave(Float32Array.from([0,0,0,0]),Float32Array.from([0,1,.18,.05]));
    const bright=ctx.createPeriodicWave(Float32Array.from([0,0,0,0,0,0,0]),Float32Array.from([0,1,.5,.33,.22,.14,.1]));
    const droneFilter=ctx.createBiquadFilter(); droneFilter.type="lowpass"; droneFilter.frequency.value=300;
    const droneGain=ctx.createGain(); droneGain.gain.value=0.14; droneFilter.connect(droneGain).connect(bus);
    [0,7].forEach(s=>{ const o=ctx.createOscillator(); o.setPeriodicWave(warm); o.frequency.value=hzFromSemi(s); o.connect(droneFilter); o.start(); this.drone.push(o); });
    const padGain=ctx.createGain(); padGain.gain.value=0; padGain.connect(bus);
    [12,15,19].forEach((s,i)=>{ const o=ctx.createOscillator(); o.setPeriodicWave(warm); o.frequency.value=hzFromSemi(s)*(i===2?CFG.detune:1); o.connect(padGain); o.start(); this.pad.push(o); });
    const shimGain=ctx.createGain(); shimGain.gain.value=0; shimGain.connect(bus);
    [24,31,34].forEach((s,i)=>{ const o=ctx.createOscillator(); o.setPeriodicWave(bright); o.frequency.value=hzFromSemi(s)*(1+0.003*i); o.connect(shimGain); o.start(); this.shim.push(o); });
    // noise buffer for hats
    const nb=ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate); const nd=nb.getChannelData(0);
    let seed=1; for(let i=0;i<nd.length;i++){ seed=(Math.imul(seed,1103515245)+12345)>>>0; nd[i]=(seed/0x7fffffff)-1; }
    this.noise=nb;
    this.bus=bus; this.master=master; this.wet=wet; this.droneFilter=droneFilter; this.droneGain=droneGain; this.padGain=padGain; this.shimGain=shimGain;
  },
  update(power){ const g=this.genre, now=this.ctx.currentTime;
    this.droneFilter.frequency.setTargetAtTime(lerp(250,3600,power), now, 0.08);
    this.droneGain.gain.setTargetAtTime(g.drone, now, 0.2);
    this.padGain.gain.setTargetAtTime(0.11*(0.25+0.75*power)*g.pad, now, 0.1);
    const gate=clamp((power-CFG.shimmerThreshold)/CFG.shimmerKnee);
    this.shimGain.gain.setTargetAtTime(0.05*gate*this.shimScale*g.shimmer, now, 0.05);
  },
  thump(when, amp){ const ctx=this.ctx, g=ctx.createGain(); g.connect(this.master);   // heartbeat, dry
    g.gain.setValueAtTime(1e-4, when); g.gain.exponentialRampToValueAtTime(Math.max(amp,1e-3), when+0.006); g.gain.exponentialRampToValueAtTime(1e-4, when+0.3);
    const o=ctx.createOscillator(); o.type="sine"; o.frequency.value=55; o.connect(g); o.start(when); o.stop(when+0.34);
    const cg=ctx.createGain(); cg.connect(this.master); cg.gain.setValueAtTime(Math.max(amp*0.4,1e-3),when); cg.gain.exponentialRampToValueAtTime(1e-4,when+0.03);
    const c=ctx.createOscillator(); c.type="sine"; c.frequency.value=95; c.connect(cg); c.start(when); c.stop(when+0.05);
  },
  bell(when, hz, amp, pan){ const ctx=this.ctx, p=ctx.createStereoPanner(); p.pan.value=pan*2-1; p.connect(this.bus);
    const g=ctx.createGain(); g.connect(p); g.gain.setValueAtTime(Math.max(amp,1e-3),when); g.gain.exponentialRampToValueAtTime(1e-4,when+1.5);
    const o=ctx.createOscillator(); o.type="sine"; o.frequency.value=hz; o.connect(g); o.start(when); o.stop(when+1.6);
    const g2=ctx.createGain(); g2.connect(p); g2.gain.setValueAtTime(Math.max(amp*0.4,1e-3),when); g2.gain.exponentialRampToValueAtTime(1e-4,when+0.5);
    const o2=ctx.createOscillator(); o2.type="sine"; o2.frequency.value=hz*2; o2.connect(g2); o2.start(when); o2.stop(when+0.6);
  },
  kick(when, amp){ const ctx=this.ctx, o=ctx.createOscillator(), g=ctx.createGain(); g.connect(this.master);  // dry, punchy
    o.frequency.setValueAtTime(125, when); o.frequency.exponentialRampToValueAtTime(45, when+0.08);
    g.gain.setValueAtTime(Math.max(amp,1e-3), when); g.gain.exponentialRampToValueAtTime(1e-4, when+0.34);
    o.connect(g); o.start(when); o.stop(when+0.36);
  },
  hat(when, amp, open){ const ctx=this.ctx, src=ctx.createBufferSource(); src.buffer=this.noise; src.loop=true;
    const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=7200;
    const g=ctx.createGain(); const dec=open?0.28:0.05; g.connect(this.bus);
    g.gain.setValueAtTime(Math.max(amp,1e-3), when); g.gain.exponentialRampToValueAtTime(1e-4, when+dec);
    src.connect(hp).connect(g); src.start(when); src.stop(when+dec+0.05);
  },
  bass(when, hz, amp, power, len){ const ctx=this.ctx, o=ctx.createOscillator(); o.type="sawtooth"; o.frequency.value=hz;
    const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.setValueAtTime(180+1600*power, when); lp.Q.value=6;
    const g=ctx.createGain(); g.connect(this.master); g.gain.setValueAtTime(1e-4,when); g.gain.linearRampToValueAtTime(Math.max(amp,1e-3),when+0.01); g.gain.exponentialRampToValueAtTime(1e-4, when+len);
    o.connect(lp).connect(g); o.start(when); o.stop(when+len+0.02);
  },
  setWet(v){ if(this.wet) this.wet.gain.setTargetAtTime(v,this.ctx.currentTime,0.05); },
  setVol(v){ if(this.master) this.master.gain.setTargetAtTime(v,this.ctx.currentTime,0.05); },
};
function tanh(drive){ const n=1024,c=new Float32Array(n); for(let i=0;i<n;i++){ const x=(i/(n-1))*2-1; c[i]=Math.tanh(x*drive); } return c; }

// ---- transport / scheduler ------------------------------------------------
const State={ model:null, dur:GENRES.house.dur, playing:false, offset:0, startCtx:0, nextBeat:0, nextBell:0, bellEv:0, nextStep:0, lastBeatT:-9 };
const LOOKAHEAD=0.12;
const musicNow=()=>State.playing?State.offset+(Engine.ctx.currentTime-State.startCtx):State.offset;
const ctxTimeFor=(music)=>State.startCtx+(music-State.offset);
const stepDur=()=>(60/Engine.genre.bpm)/4;          // 16th note
function reseat(){ State.nextBeat=State.offset; State.nextBell=State.offset; State.bellEv=Math.floor(State.offset); State.nextStep=Math.ceil(State.offset/stepDur()); }

function scheduler(){
  if(!State.playing) return;
  const m=State.model, g=Engine.genre, now=musicNow(), ahead=now+LOOKAHEAD;
  if(now>=State.dur){ pause(); seek(State.dur); return; }
  // heartbeat — the rider's real pulse (scaled by genre)
  while(State.nextBeat<ahead){
    const rt=rideTime(m,State.nextBeat,State.dur); let hr=m.hr(rt); if(hr<=0)hr=60;
    const period=60/Math.max(hr/CFG.hrPulseDiv,30), amp=(0.22+0.30*m.nHr(hr))*g.heart;
    if(g.heart>0.001) Engine.thump(Math.max(ctxTimeFor(State.nextBeat),Engine.ctx.currentTime+0.01), amp);
    State.lastBeatT=State.nextBeat; State.nextBeat+=period;
  }
  // bells — pitch from altitude, rate from cadence
  while(State.nextBell<ahead){
    const rt=rideTime(m,State.nextBell,State.dur), cad=m.nCad(m.cad(rt)), alt=m.nAlt(m.alt(rt));
    const interval=lerp(CFG.bellIntervalSlow,CFG.bellIntervalFast,cad);
    if(g.bell>0.001 && xorshift01(State.bellEv)>=CFG.bellSkip){
      const octave=2+Math.floor(alt*2.99), degree=Math.floor(xorshift01(State.bellEv*7+1)*CFG.scale.length)%CFG.scale.length;
      Engine.bell(Math.max(ctxTimeFor(State.nextBell),Engine.ctx.currentTime+0.01), hzFromSemi(CFG.scale[degree]+12*octave), (0.12+0.12*(1-cad))*g.bell, xorshift01(State.bellEv*13+5));
    }
    State.nextBell+=interval; State.bellEv++;
  }
  // beat grid — kick / hats / bass on the genre's BPM, driven by effort
  const sd=stepDur();
  while(State.nextStep*sd<ahead){
    const step=State.nextStep, sm=step*sd, rt=rideTime(m,sm,State.dur);
    const power=m.nPow(m.pow(rt)), alt=m.nAlt(m.alt(rt)), cad=m.nCad(m.cad(rt));
    const swing=(g.swing && step%2===1)?g.swing*sd:0;
    const when=Math.max(ctxTimeFor(sm+swing), Engine.ctx.currentTime+0.005);
    if(g.kick>0 && step%4===0) Engine.kick(when, g.kick*(0.55+0.45*power));
    if(g.hat>0){ if(step%2===0) Engine.hat(when, g.hat*0.42*(0.6+0.4*cad), false);
      if(g.openhat && step%4===2) Engine.hat(when, g.hat*0.55, true); }
    if(g.bass>0 && (step%4===0 || step%8===6)){
      const degree=Math.floor(alt*CFG.scale.length)%CFG.scale.length;
      Engine.bass(when, hzFromSemi(CFG.scale[degree]), g.bass*(0.5+0.5*power), power, sd*(step%4===0?2:1.5));
    }
    State.nextStep++;
  }
}

function play(){ Engine.init(); if(Engine.ctx.state==="suspended")Engine.ctx.resume();
  if(musicNow()>=State.dur)State.offset=0; State.startCtx=Engine.ctx.currentTime; State.playing=true; reseat(); playBtn.innerHTML="&#10073;&#10073;"; }
function pause(){ if(!State.playing)return; State.offset=musicNow(); State.playing=false; playBtn.innerHTML="&#9654;"; }
function seek(music){ State.offset=clamp(music,0,State.dur); if(State.playing){ State.startCtx=Engine.ctx.currentTime; reseat(); } }
function setGenre(key){ const frac=clamp(musicNow()/State.dur); Engine.genre=GENRES[key]; State.dur=GENRES[key].dur;
  [...document.querySelectorAll("#genre button")].forEach(b=>b.classList.toggle("on", b.dataset.k===key));
  seek(frac*State.dur); }

// ---- player visuals -------------------------------------------------------
const cv=document.getElementById("cv"), g=cv.getContext("2d"); let W=0,H=0;
function resize(){ const r=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1; W=Math.max(1,r.width); H=Math.max(1,r.height); cv.width=W*dpr; cv.height=H*dpr; g.setTransform(dpr,0,0,dpr,0,0); }
window.addEventListener("resize",()=>{ if(!player.classList.contains("hidden")) resize(); });

function draw(){
  requestAnimationFrame(draw);
  if(player.classList.contains("hidden") || !State.model) return;
  const m=State.model, music=musicNow(), frac=clamp(music/State.dur), rt=rideTime(m,music,State.dur);
  const power=m.nPow(m.pow(rt));
  if(State.playing){ Engine.update(power); scheduler(); }
  g.clearRect(0,0,W,H); g.fillStyle="#0a0a0e"; g.fillRect(0,0,W,H);
  const pad=26, elevH=Math.min(150,H*0.26), routeBottom=H-elevH-46;

  if(m.route.length>1){
    const proj=routeFitMass(m, pad,24, W-pad*2, Math.max(40,routeBottom-24));
    g.lineCap="round"; g.lineJoin="round";
    // two passes: a soft bloom underlay, then a crisp thin core — luminous, not neon
    for(let pass=0;pass<2;pass++){
      for(let k=1;k<m.route.length;k++){ const a=proj(...m.route[k-1]), b=proj(...m.route[k]);
        const e=m.effort[k], reached=(m.cum[k]/m.total)<=frac;
        g.strokeStyle=heat(0.08+0.66*e);   // compress the ramp: tops out at warm amber, never neon yellow
        if(pass===0){ g.globalAlpha=reached?0.09:0.03; g.lineWidth=2.6+3.6*e; }
        else { g.globalAlpha=reached?0.9:0.16; g.lineWidth=0.7+1.3*e; }
        g.beginPath(); g.moveTo(a[0],a[1]); g.lineTo(b[0],b[1]); g.stroke(); }
    }
    g.globalAlpha=1;
    let idx=0; const tgt=frac*m.total; while(idx<m.cum.length-1 && m.cum[idx]<tgt)idx++;
    const dot=proj(...m.route[idx]), pulse=State.lastBeatT>-1?Math.exp(-(music-State.lastBeatT)/0.18):0;
    if(pulse>0.05){ g.globalAlpha=pulse*0.55; g.strokeStyle="rgba(255,96,72,1)"; g.lineWidth=2; g.beginPath(); g.arc(dot[0],dot[1],7+20*pulse,0,7); g.stroke(); g.globalAlpha=1; }
    g.save(); g.shadowColor="rgba(255,255,255,0.85)"; g.shadowBlur=12; g.fillStyle="#f4f4f6"; g.beginPath(); g.arc(dot[0],dot[1],4.5,0,7); g.fill(); g.restore();
  }

  const s=m.ride.streams, A=s.altitude, D=s.distance, ey=H-elevH-30, eh=elevH;
  if(A&&D){
    const amin=Math.min(...A.filter(isNum)), amax=Math.max(...A.filter(isNum));
    const arng=Math.max(amax-amin, 55);   // floor: don't amplify a flat ride's sensor jitter into spikes
    const ept=(i)=>[pad+(D[i]/m.dmax)*(W-pad*2), ey+eh-((A[i]-amin)/arng)*eh*0.82];
    g.fillStyle="#111119"; g.beginPath(); g.moveTo(pad,ey+eh); for(let i=0;i<A.length;i++){const p=ept(i); g.lineTo(p[0],p[1]);} g.lineTo(W-pad,ey+eh); g.closePath(); g.fill();
    for(let i=1;i<A.length;i++){ const a=ept(i-1),b=ept(i); g.strokeStyle=heat(m.nPow(m.pow(s.time[i]))); g.lineWidth=1.8; g.beginPath(); g.moveTo(a[0],a[1]); g.lineTo(b[0],b[1]); g.stroke(); }
    g.strokeStyle="rgba(255,255,255,0.05)"; g.lineWidth=1; g.beginPath(); g.moveTo(pad,ey+eh); g.lineTo(W-pad,ey+eh); g.stroke();
    const HR=s.hr; if(HR){ const hmin=Math.min(...HR.filter(isNum)), hmax=Math.max(...HR.filter(isNum)), hrng=(hmax-hmin)||1;
      g.strokeStyle="rgba(90,209,224,0.5)"; g.lineWidth=1.3; g.beginPath();
      for(let i=0;i<HR.length;i++){ if(!isNum(HR[i]))continue; const x=pad+(D[i]/m.dmax)*(W-pad*2), y=ey+eh-((HR[i]-hmin)/hrng)*eh*0.82; i?g.lineTo(x,y):g.moveTo(x,y);} g.stroke(); }
    const px=pad+(m.dist(rt)/m.dmax)*(W-pad*2); g.strokeStyle="rgba(244,244,246,0.4)"; g.lineWidth=1; g.beginPath(); g.moveTo(px,ey-4); g.lineTo(px,ey+eh); g.stroke();
  }

  const stats=[["PWR",Math.round(m.pow(rt))+"W"],["HR",Math.round(m.hr(rt))+"bpm"],["CAD",Math.round(m.cad(rt))+"rpm"],["ALT",Math.round(m.alt(rt))+"m"],["GRD",m.grade(rt).toFixed(1)+"%"]];
  let sx=pad; stats.forEach(([k,v])=>{ g.fillStyle="#f4f4f6"; g.font="600 22px Helvetica Neue, Arial"; g.fillText(v,sx,ey-14); g.fillStyle="#7a7a86"; g.font="11px Helvetica Neue, Arial"; g.fillText(k,sx,ey-34); sx+=Math.max(96,g.measureText(v).width+54); });
  scrub.value=Math.round(frac*1000); clock.textContent=fmt(music)+" / "+fmt(State.dur);
}

// ---- gallery --------------------------------------------------------------
const gallery=document.getElementById("gallery"), player=document.getElementById("player");
function drawThumb(cnv, ride){ const m=buildModel(ride), c=cnv.getContext("2d"), dpr=window.devicePixelRatio||1, r=cnv.getBoundingClientRect(), w=r.width||260, h=150;
  cnv.width=w*dpr; cnv.height=h*dpr; c.setTransform(dpr,0,0,dpr,0,0); c.clearRect(0,0,w,h);
  if(m.route.length<2)return; const proj=routeFit(m,12,12,w-24,h-24); c.lineCap="round"; c.lineJoin="round";
  for(let k=1;k<m.route.length;k++){ const a=proj(...m.route[k-1]),b=proj(...m.route[k]); c.strokeStyle=heat(m.effort[k]); c.lineWidth=1+2.4*m.effort[k]; c.beginPath(); c.moveTo(a[0],a[1]); c.lineTo(b[0],b[1]); c.stroke(); }
}
function buildGallery(){
  document.getElementById("gtag").textContent=DATA.rides.length+" RIDES · CLICK TO PLAY · "+(CFG.mantra||"").toUpperCase();
  const grid=document.getElementById("grid");
  DATA.rides.forEach(ride=>{
    const sm=ride.summary||{}; const card=document.createElement("div"); card.className="card";
    const cnv=document.createElement("canvas");
    const meta=document.createElement("div"); meta.className="meta";
    meta.innerHTML=`<div class="nm">${esc(ride.name||ride.id)}</div>
      <div class="dt">${ride.date} · ${esc(ride.sport||"")}</div>
      <div class="st"><div><b>${(sm.distance||0)/1000|0}</b><span>KM</span></div>
        <div><b>${sm.elevation_gain|0}</b><span>M CLIMB</span></div>
        <div><b>${sm.relative_effort|0}</b><span>EFFORT</span></div></div>`;
    card.appendChild(cnv); card.appendChild(meta);
    card.onclick=()=>openInstrument(ride);
    grid.appendChild(card); requestAnimationFrame(()=>drawThumb(cnv,ride));
  });
}
const esc=(t)=>String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function openInstrument(ride){
  State.model=buildModel(ride);
  document.getElementById("title").textContent=(ride.name||"ride").toUpperCase();
  document.getElementById("subtitle").textContent=[ride.date,(CFG.location||"").toUpperCase(),(ride.sport||"").toUpperCase()].filter(Boolean).join("  ·  ");
  gallery.classList.add("hidden"); player.classList.remove("hidden");
  resize(); seek(0); play();   // the click is the gesture — start it
}
function toGallery(){ pause(); player.classList.add("hidden"); gallery.classList.remove("hidden"); }

// ---- wiring ---------------------------------------------------------------
const playBtn=document.getElementById("play"), scrub=document.getElementById("scrub"), clock=document.getElementById("clock");
const wetEl=document.getElementById("wet"), shimEl=document.getElementById("shim"), volEl=document.getElementById("vol");
// genre segmented control
const genreEl=document.getElementById("genre");
GENRE_ORDER.forEach(k=>{ const g=GENRES[k]; const b=document.createElement("button"); b.dataset.k=k;
  b.innerHTML=g.label+'<span class="t">'+g.time+'</span>'; b.onclick=()=>setGenre(k); genreEl.appendChild(b); });

playBtn.onclick=()=>{ State.playing?pause():play(); };
scrub.oninput=()=>seek(scrub.value/1000*State.dur);
document.getElementById("back").onclick=toGallery;
wetEl.oninput=()=>{ wetv.textContent=wetEl.value+"%"; if(Engine.ctx)Engine.setWet(+wetEl.value/100*(CFG.reverbWet/0.30)); };
shimEl.oninput=()=>{ shimv.textContent=shimEl.value+"%"; Engine.shimScale=+shimEl.value/100; };
volEl.oninput=()=>{ volv.textContent=volEl.value+"%"; if(Engine.ctx)Engine.setVol(+volEl.value/100); };
document.getElementById("mantra").textContent="— "+(CFG.mantra||"");
wetv.textContent=wetEl.value+"%"; shimv.textContent=shimEl.value+"%"; volv.textContent=volEl.value+"%";

setGenre("house");
buildGallery();
requestAnimationFrame(draw);
</script>
</body>
